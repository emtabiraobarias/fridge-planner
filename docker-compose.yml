services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fridge-planner
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  holodeck:
    image: ghcr.io/emtabiraobarias/fridge-planner:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      HOLODECK_PORT: 8001
      HOLODECK_PROTOCOL: rest
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Phase C-bis: the Next.js app is now the whole backend — it talks to MongoDB and
  # the Holodeck agent directly (no Express service, no proxy).
  client:
    build:
      context: packages/client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/fridge-planner
      HOLODECK_URL: http://holodeck:8001
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
      holodeck:
        condition: service_healthy

volumes:
  mongodb_data:
