name: CI (impl/nextjs)

# Phase E — E1: the CI gate for the Next.js implementation.
# Runs lint → unit/integration tests → deterministic E2E smoke → Playwright browser
# E2E on every push to impl/nextjs and every PR targeting it. Branch protection on
# impl/nextjs should require the `verify` check below.
#
# Backlog #6 (2026-07-23): the Playwright suite (packages/client/e2e/*.e2e.ts) is now
# part of this gate, so every new user-facing feature's browser coverage (CLAUDE.md §8)
# runs automatically here — not only as a manual pre-release step.
#
# Scope: impl/nextjs only. The shared contract lives on `main`; impl/vite has its
# own pipeline. This file is a per-branch file — it must never be merged to `main`.

on:
  push:
    branches: [impl/nextjs]
  pull_request:
    branches: [impl/nextjs]

# A newer push to the same ref cancels an in-flight run.
concurrency:
  group: ci-nextjs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint · test · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # matches packages/client/Dockerfile (node:20-alpine)
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      # Vitest — includes the node-env server tests, which use mongodb-memory-server
      # (in-process), so no external MongoDB is required for this step.
      - name: Test
        run: npm test

      # Deterministic release gate: prod build + real MongoDB (brought up by the
      # script via docker compose) → shared smoke. --no-agent skips Holodeck, so no
      # LLM credentials are needed in CI. The live-agent E2E stays manual/nightly.
      - name: E2E smoke (no agent)
        run: bash scripts/validate-e2e.sh --no-agent

      # Playwright browser E2E — the full packages/client/e2e/*.e2e.ts suite against a
      # real next build + in-memory Mongo (no Docker, no Holodeck; recommendations fall
      # back to popular recipes by design). Runs alongside the API smoke so every
      # feature's browser coverage is enforced automatically (backlog #6 / CLAUDE.md §8).
      - name: E2E browser tests (Playwright)
        run: |
          npm -w packages/client exec -- playwright install --with-deps chromium
          npm -w packages/client run test:e2e
