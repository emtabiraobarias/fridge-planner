name: Deploy (impl/nextjs)

# Phase E — E2: CD for the Next.js implementation, Portainer-CE edition.
#
# DECISION (2026-07-15): the production stack is a **git-backed Portainer stack** on
# Portainer **CE**, so CI stops at build-push and the rollout is a manual Portainer
# "Pull and redeploy" (the CE-sanctioned option — see CLAUDE.md §15 and
# docs/deployment.md → "Updating a running deployment"). The former `deploy` job
# (self-hosted runner + docker compose on the host) was removed: the host has no
# compose directory for a runner to cd into (Portainer manages the checkout), and
# CE has no stack webhooks to call instead. If the stack ever moves to Portainer BE
# (webhooks) or a host compose dir (Path B), resurrect the deploy job from git
# history (removed at tag nextjs-v4.1.1).
#
# Flow:  push tag `nextjs-v*`  →  build & push image (:<version>, :sha-<sha>, :latest)
#                              →  run-summary prints the manual rollout steps
#
# Per-branch file (impl/nextjs only) — must never be merged to `main`.
# The app image is SEPARATE from the Holodeck images; we publish the Next app as
# `…/fridge-planner-client`.

on:
  push:
    tags: ['nextjs-v*']

permissions:
  contents: read
  packages: write # push to GHCR

env:
  IMAGE: ghcr.io/emtabiraobarias/fridge-planner-client

jobs:
  # ── Build the standalone Next image and push it, pinned by digest ─────────────
  build-push:
    name: build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: meta
        run: |
          # refs/tags/nextjs-v4.1.0 -> 4.1.0
          version="${GITHUB_REF_NAME#nextjs-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building version ${version} from ${GITHUB_REF_NAME}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: packages/client
          file: packages/client/Dockerfile
          push: true
          # E0b: public OIDC config baked into the client bundle. Stage-1 internal values
          # (non-secret — they end up in client JS). Stage 2 (s9) updates these to the
          # public domain. If you move these to repo Variables, swap in ${{ vars.* }}.
          build-args: |
            NEXT_PUBLIC_OIDC_ISSUER=https://auth.fridgeplanner.lan:8443/realms/fridge-planner
            NEXT_PUBLIC_OIDC_CLIENT_ID=fridge-planner-app
            NEXT_PUBLIC_OIDC_REDIRECT_URI=https://fridgeplanner.lan:8443/auth/callback
          # A human-readable version tag, an immutable sha tag, and :latest (the prod
          # compose's APP_IMAGE default — lets Portainer "Pull and redeploy" pick up the
          # release; pinning APP_IMAGE to :<version> in the stack env is still preferred).
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rollout instructions (manual — Portainer CE, git-backed stack)
        run: |
          {
            echo "## Image published"
            echo '```'
            echo "${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"
            echo "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
            echo '```'
            echo "## Manual rollout (Portainer)"
            echo "1. Portainer → Stacks → fridge-planner → (recommended) set stack env \`APP_IMAGE=${{ env.IMAGE }}:${{ steps.meta.outputs.version }}\`"
            echo "2. **Pull and redeploy** (re-pulls the git compose + images)."
            echo "3. Smoke: \`curl -fsS \$BASE_URL/api/health\` → 200; unauthenticated \`/api/v1/inventory\` → 401."
            echo "4. Rollback = set \`APP_IMAGE\` back to the previous version tag and redeploy."
          } >> "$GITHUB_STEP_SUMMARY"
