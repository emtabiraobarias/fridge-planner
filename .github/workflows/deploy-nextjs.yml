name: Deploy (impl/nextjs)

# Phase E — E2: CD for the Next.js implementation, Portainer-CE edition.
#
# DECISION (2026-07-15): the production stack is a **git-backed Portainer stack** on
# Portainer **CE**. The former `deploy` job (self-hosted runner + docker compose on
# the host) was removed: the host has no compose directory for a runner to cd into
# (Portainer manages the checkout), and CE has no stack *webhooks* (Business-only).
#
# DECISION (2026-07-21, supersedes the rollout half of the above): rather than a
# self-hosted runner or a BE webhook, the stack uses Portainer CE's built-in GitOps
# **polling** (see CLAUDE.md §15 / docs/deployment.md → "Updating a running
# deployment" / deploy/checklist.yaml → s7b-gitops-poll). CI's job is still just
# build-push — nothing here calls Portainer — but rollout is no longer a manual
# click: every image defaults to `:latest` in docker-compose.prod.yml, this job
# publishes `:latest` on every tag, and Portainer re-pulls + redeploys the whole
# stack on its own poll interval. If Portainer ever moves to Business Edition
# (webhooks) or the host gains a compose dir (Path B) for a runner, resurrect the
# old deploy job from git history (removed at tag nextjs-v4.1.1).
#
# Flow:  push tag `nextjs-v*`  →  build & push image (:<version>, :sha-<sha>, :latest)
#                              →  Portainer's own poll cycle picks up :latest and redeploys
#                              →  run-summary prints a smoke-check reminder + the manual
#                                 override procedure (pin a version) for an off-cycle
#                                 rollout or a rollback
#
# Per-branch file (impl/nextjs only) — must never be merged to `main`.
# The app image is SEPARATE from the Holodeck images; we publish the Next app as
# `…/fridge-planner-client`.

on:
  push:
    tags: ['nextjs-v*']

permissions:
  contents: read
  packages: write # push to GHCR

env:
  IMAGE: ghcr.io/emtabiraobarias/fridge-planner-client

jobs:
  # ── Build the standalone Next image and push it, pinned by digest ─────────────
  build-push:
    name: build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: meta
        run: |
          # refs/tags/nextjs-v4.1.0 -> 4.1.0
          version="${GITHUB_REF_NAME#nextjs-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building version ${version} from ${GITHUB_REF_NAME}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: packages/client
          file: packages/client/Dockerfile
          push: true
          # E0b: public OIDC config baked into the client bundle. Stage-1 internal values
          # (non-secret — they end up in client JS). Stage 2 (s9) updates these to the
          # public domain. If you move these to repo Variables, swap in ${{ vars.* }}.
          build-args: |
            NEXT_PUBLIC_OIDC_ISSUER=https://auth.fridgeplanner.lan:8443/realms/fridge-planner
            NEXT_PUBLIC_OIDC_CLIENT_ID=fridge-planner-app
            NEXT_PUBLIC_OIDC_REDIRECT_URI=https://fridgeplanner.lan:8443/auth/callback
          # A human-readable version tag, an immutable sha tag, and :latest (the prod
          # compose's APP_IMAGE default — lets Portainer "Pull and redeploy" pick up the
          # release; pinning APP_IMAGE to :<version> in the stack env is still preferred).
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rollout status (automatic — Portainer GitOps polling)
        run: |
          {
            echo "## Image published"
            echo '```'
            echo "${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"
            echo "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
            echo '```'
            echo "## Rollout (automatic, no action needed)"
            echo "Portainer's GitOps polling will re-pull \`${{ env.IMAGE }}:latest\` and redeploy the"
            echo "whole stack on its own interval (deploy/checklist.yaml → s7b-gitops-poll). GitHub"
            echo "Actions cannot reach the internal-LAN Portainer instance to verify this itself —"
            echo "**after the poll interval elapses**, confirm from the LAN:"
            echo '```'
            echo "curl -fsS https://fridgeplanner.lan:8443/api/health   # expect 200"
            echo "curl -s -o /dev/null -w '%{http_code}\n' https://fridgeplanner.lan:8443/api/v1/inventory  # expect 401 (unauthenticated)"
            echo '```'
            echo "## Manual override (off-cycle rollout, or rollback)"
            echo "1. Portainer → Stacks → fridge-planner → set stack env \`APP_IMAGE=${{ env.IMAGE }}:${{ steps.meta.outputs.version }}\` (or an older version tag to roll back) → **Pull and redeploy**."
            echo "2. Auto-update will keep reasserting \`:latest\` on its next poll — **unset the pinned \`APP_IMAGE\`** once you're done, or the override reverts on its own."
          } >> "$GITHUB_STEP_SUMMARY"
