name: Agent image (meal-recommender)

# Phase E: build & publish the Holodeck meal-recommender agent container to
# ghcr.io/emtabiraobarias/fridge-planner (the AGENT image — distinct from the app
# image …/fridge-planner-client). The prod compose's `holodeck` service pulls
# :latest. Anthropic/Claude agent → manual `holodeck serve` container (see
# agents/meal-recommender/Dockerfile).
#
# Trigger: push a tag `agent-v*` (e.g. agent-v1.0.0). Publishes :<version> + :latest.
# Per-branch file (impl/nextjs). Built linux/amd64 to match the LAN host.

on:
  push:
    tags: ['agent-v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/emtabiraobarias/fridge-planner

jobs:
  build-push:
    name: build & push agent image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: meta
        run: |
          # refs/tags/agent-v1.0.0 -> 1.0.0
          version="${GITHUB_REF_NAME#agent-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building agent image version ${version}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: agents/meal-recommender
          file: agents/meal-recommender/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report digest
        run: echo "Pushed ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} (+ :latest) @ ${{ steps.build.outputs.digest }}"
