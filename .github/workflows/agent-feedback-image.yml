name: Agent image (feedback-collector)

# Phase F (F6): build & publish the Holodeck feedback-collector agent container to
# ghcr.io/emtabiraobarias/fridge-planner-feedback (distinct from the meal-recommender
# agent image …/fridge-planner and the app image …/fridge-planner-client). The prod
# compose's `holodeck-feedback` service pulls :latest by default (override with
# FEEDBACK_AGENT_IMAGE). Provider is OpenAI (needs OPENAI_API_KEY at runtime — see
# agents/feedback-collector/Dockerfile).
#
# Trigger: push a tag `agent-feedback-v*` (e.g. agent-feedback-v1.0.0).
# Publishes :<version> + :latest. Per-branch file (impl/nextjs). Built linux/amd64
# to match the LAN host.

on:
  push:
    tags: ['agent-feedback-v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/emtabiraobarias/fridge-planner-feedback

jobs:
  build-push:
    name: build & push feedback agent image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: meta
        run: |
          # refs/tags/agent-feedback-v1.0.0 -> 1.0.0
          version="${GITHUB_REF_NAME#agent-feedback-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building feedback agent image version ${version}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: agents/feedback-collector
          file: agents/feedback-collector/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report digest
        run: echo "Pushed ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} (+ :latest) @ ${{ steps.build.outputs.digest }}"
