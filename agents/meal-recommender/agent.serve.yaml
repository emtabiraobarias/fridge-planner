# Meal Recommender — SERVE-ONLY config (production container entrypoint).
#
# Derived from agent.yaml but WITHOUT the `evaluations`, `test_cases`, and
# `observability` blocks: those reference dev/test env vars (OLLAMA_ENDPOINT,
# AZURE_OPENAI_*, OTLP_ENDPOINT) that `holodeck serve` tries to resolve at load
# time and that don't exist in production. `holodeck serve` needs only the model
# + instructions + claude blocks. The system prompt stays single-source
# (instructions/system-prompt.md) — keep the model/claude settings here in sync
# with agent.yaml if they change. Use agent.yaml for `holodeck test`.
#
# Only runtime credential: CLAUDE_CODE_OAUTH_TOKEN (via model.auth_provider), which
# the compose injects — no ${VAR} interpolation remains in this file.

name: meal-recommender
description: AI-powered meal recommendation agent that suggests meals to minimise food waste

execution:
  llm_timeout: 180

model:
  provider: anthropic
  name: claude-sonnet-4-6
  auth_provider: oauth_token
  temperature: 0.5
  max_tokens: 2000

instructions:
  file: instructions/system-prompt.md

claude:
  max_turns: 15
  setting_sources: [] # explicit: no inheritance from ~/.claude or project settings
  extended_thinking:
    enabled: false
  allowed_tools:
    - WebSearch
    - WebFetch
